# ============================================================================
# COMPLEX MUTATIONS (Common Workflows)
# ============================================================================

# Share incident and link participants in one operation
mutation ShareIncidentWithParticipants(
  $networkId: ID!
  $tenantDocumentId: ID!
  $dsfId: ID!
  $metadata: JSON!
  $participantIds: [ID!]!           # Shared record IDs of participants
) {
  shareIncidentWithParticipants(
    network_id: $networkId
    tenant_document_id: $tenantDocumentId
    dsf_id: $dsfId
    metadata: $metadata
    participant_ids: $participantIds
  ) {
    incident {
      id
      metadata
      sources {
        org_name
      }
    }

    linked_participants {
      id
      sources {
        org_name
      }
    }
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "tenantDocumentId": "6001",
#   "dsfId": "211",
#   "metadata": {
#     "severity": "high",
#     "incident_type": "assault",
#     "location": "Portland, OR",
#     "occurred_at": "2025-03-01T18:00:00Z"
#   },
#   "participantIds": ["1", "3"]
# }

# ----------------------------------------------------------------------------

# Confirm match and add note in one operation
mutation ConfirmMatchWithNote(
  $networkId: ID!
  $sharedRecordId: ID!
  $sourceIds: [ID!]!
  $noteContent: String!
) {
  confirmMatchWithNote(
    network_id: $networkId
    shared_record_id: $sharedRecordId
    source_ids: $sourceIds
    note_content: $noteContent
  ) {
    confirmed_record {
      id
      status
      match_confidence_score
    }

    note {
      id
      content
      created_at
    }
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "sharedRecordId": "4",
#   "sourceIds": ["10", "11"],
#   "noteContent": "Match confirmed after reviewing case notes from both orgs."
# }

