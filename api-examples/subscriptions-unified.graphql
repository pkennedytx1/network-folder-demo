# ============================================================================
# Network Document Folder - GraphQL Subscriptions (UNIFIED SCHEMA)
# ============================================================================
# Real-time updates for unified network_shared_records table
# Key Changes:
# - Single `recordUpdated` subscription for all types (replaces separate subscriptions)
# - Filter by `record_type` for participant vs incident updates
# - Unified event payload structure
# ============================================================================

# ============================================================================
# CORE SUBSCRIPTION: RECORD UPDATES
# ============================================================================

# Subscribe to updates for any record type
subscription RecordUpdated(
  $networkId: ID!
  $recordType: RecordType     # Optional: filter by 'participant' or 'incident'
) {
  recordUpdated(
    network_id: $networkId
    record_type: $recordType
  ) {
    # The updated record
    record {
      id
      network_id
      record_type
      status
      match_confidence_score
      metadata

      sources {
        id
        org_id
        org_name
        tenant_document_id
        dsf_id
        source_type
        dsf_view_data       # PII filtered automatically
      }

      responses {
        id
        org_id
        org_name
        response_type
        response_data
        created_at
      }
    }

    # Change metadata
    change_type               # 'CREATED', 'UPDATED', 'DELETED', 'MATCH_CONFIRMED'
    changed_by_org_id
    changed_by_org_name
    changed_by_user_id
    changed_by_user_name
    changed_at
  }
}

# Variables examples:

# Subscribe to all record types:
# {
#   "networkId": "1"
# }

# Subscribe to participant updates only:
# {
#   "networkId": "1",
#   "recordType": "participant"
# }

# Subscribe to incident updates only:
# {
#   "networkId": "1",
#   "recordType": "incident"
# }

# ============================================================================
# PARTICIPANT-SPECIFIC SUBSCRIPTION
# ============================================================================

# Subscribe to potential match detections
subscription MatchDetected($networkId: ID!) {
  matchDetected(network_id: $networkId) {
    # The potential match that was detected
    potential_match {
      id
      network_id
      match_score
      match_factors         # JSON: {"ssn": 45, "dob": 35, "name": 20}
      status
      created_at

      shared_record_a {
        id
        sources {
          org_name
          dsf_view_data   # PII filtered
        }
      }

      shared_record_b {
        id
        sources {
          org_name
          dsf_view_data   # PII filtered
        }
      }
    }

    # Context
    detected_at
    detection_algorithm_version
  }
}

# Variables example:
# {
#   "networkId": "1"
# }

# ============================================================================
# NOTES SUBSCRIPTION
# ============================================================================

# Subscribe to new notes in network
subscription NoteAdded(
  $networkId: ID!
  $noteType: String         # Optional: filter by note type
) {
  noteAdded(
    network_id: $networkId
    note_type: $noteType
  ) {
    note {
      id
      network_id
      network_shared_record_id

      author_org_id
      author_org_name
      author_user_id
      author_user_name

      content
      note_type
      created_at
    }
  }
}

# Variables examples:

# All notes:
# {
#   "networkId": "1"
# }

# Alert notes only:
# {
#   "networkId": "1",
#   "noteType": "alert"
# }

# ============================================================================
# ORG MEMBERSHIP SUBSCRIPTION
# ============================================================================

# Subscribe to network membership changes (admin only)
subscription NetworkMembershipChanged($networkId: ID!) {
  networkMembershipChanged(network_id: $networkId) {
    change_type             # 'ORG_JOINED', 'ORG_REMOVED', 'PII_SETTINGS_CHANGED'

    affected_org {
      org_id
      org_name
      member_type
      pii_sharing_enabled
      pii_fields_shared
      active
      joined_at
      removed_at
    }

    changed_at
    changed_by_user_id
  }
}

