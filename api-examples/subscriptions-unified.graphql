# ============================================================================
# PERFORMANCE TIPS
# ============================================================================

# 1. Filter subscriptions on the server (not client)
#    - Use `withFilter` in resolver to avoid sending unnecessary data
#
# 2. Unsubscribe when component unmounts
#    - React hooks handle this automatically, but check for manual subscriptions
#
# 3. Batch rapid updates
#    - Use debouncing to avoid UI thrashing from multiple rapid updates
#
# 4. Limit subscription scope
#    - Subscribe to specific record types when possible
#    - Avoid subscribing to networks with 1000s of records
#
# 5. Monitor connection status
#    - Show visual indicator when disconnected
#    - Implement reconnection logic with exponential backoff
#
# 6. Consider polling as fallback
#    - If subscription fails, fall back to periodic polling
#    - Automatically switch back to subscriptions when connection restored

# ============================================================================
# MIGRATION NOTES (Old Schema → New Schema)
# ============================================================================

# OLD SUBSCRIPTIONS:
# - participantUpdated(network_id: ID!)
# - incidentUpdated(network_id: ID!)
# - matchDetected(network_id: ID!)

# NEW UNIFIED SUBSCRIPTION:
# - recordUpdated(network_id: ID!, record_type: RecordType)
#   - Single subscription handles both participants and incidents
#   - Filter by record_type if needed
#   - Same payload structure for all types

# BENEFITS:
# - Fewer WebSocket connections (1 instead of 2+)
# - Consistent event handling code
# - Easier to add new record types (no new subscriptions needed)

