# ============================================================================
# NETWORK METADATA QUERIES
# ============================================================================

# Get network overview
query GetNetworkOverview($networkId: ID!) {
  network(id: $networkId) {
    id
    name
    description
    lead_org_id
    lead_org_name

    member_orgs {
      org_id
      org_name
      joined_at
      pii_sharing_enabled
    }

    statistics {
      total_participants
      confirmed_matches
      potential_matches
      active_incidents
      total_referrals
      pending_referrals
    }

    created_at
  }
}

