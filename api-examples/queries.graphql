# Get my org's permissions in network
query GetMyNetworkPermissions($networkId: ID!) {
  myNetworkPermissions(network_id: $networkId) {
    org_id
    org_name
    role  # network_admin, network_member, network_viewer

    can_view_participants
    can_confirm_matches
    can_create_incidents
    can_create_referrals
    can_view_pii_from_orgs

    pii_fields_i_share
  }
}

