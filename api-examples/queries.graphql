# Search participants by partial name (with PII filtering)
query SearchParticipants($networkId: ID!, $searchTerm: String!) {
  searchNetworkParticipants(
    network_id: $networkId
    search_term: $searchTerm
  ) {
    results {
      id
      match_status

      # PII automatically filtered based on permissions
      sources {
        org_name
        name_used
        dob
      }

      # Show risk level
      recent_incidents_count
      active_referrals_count
      last_activity_date
    }
  }
}

