# ============================================================================
# AUDIT LOG QUERIES
# ============================================================================

# Get audit log for network (admin only)
query GetNetworkAuditLog(
  $networkId: ID!
  $action: String
  $resourceType: String
  $userId: ID
  $startDate: String
  $endDate: String
  $limit: Int
) {
  networkAuditLog(
    network_id: $networkId
    action: $action
    resource_type: $resourceType
    user_id: $userId
    start_date: $startDate
    end_date: $endDate
    limit: $limit
  ) {
    total
    entries {
      id
      user_id
      user_name
      org_id
      org_name

      action
      resource_type
      resource_id

      pii_fields_accessed

      ip_address
      user_agent

      metadata

      created_at
    }
  }
}

