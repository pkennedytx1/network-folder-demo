# ============================================================================
# COMPLEX QUERIES (Real-World Use Cases)
# ============================================================================

# Dashboard query - get everything for network home page
query GetNetworkDashboard($networkId: ID!) {
  network(id: $networkId) {
    id
    name

    # Recent incidents (last 7 days)
    recentIncidents: incidents(
      limit: 5
      occurred_after: "2025-03-17"
    ) {
      id
      title
      severity
      status
      occurred_at
      reported_by_org_name
    }

    # Potential matches needing review
    potentialMatches(status: "pending_review", limit: 10) {
      id
      match_score
      participant_a {
        sources { org_name, name_used }
      }
      participant_b {
        sources { org_name, name_used }
      }
    }

    # Pending referrals to my org
    pendingReferrals: referrals(
      to_org_id: "$MY_ORG_ID"
      status: "pending"
      limit: 5
    ) {
      id
      from_org_name
      participant {
        sources { name_used }
      }
      urgency
      created_at
    }

    # Recent network activity
    recentNotes(limit: 10, note_type: ["alert", "coordination"]) {
      id
      author_org_name
      content
      note_type
      created_at
    }

    statistics {
      total_participants
      active_incidents
      pending_referrals
    }
  }
}

