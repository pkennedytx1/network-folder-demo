# ============================================================================
# PARTICIPANT QUERIES
# ============================================================================

# Get all participants in a network with filtering
query GetNetworkParticipants($networkId: ID!, $matchStatus: MatchStatus, $limit: Int, $offset: Int) {
  networkParticipants(
    network_id: $networkId
    match_status: $matchStatus
    limit: $limit
    offset: $offset
  ) {
    total
    hasMore
    participants {
      id
      network_id
      match_status
      match_confidence_score
      created_at
      confirmed_at

      # Sources from multiple orgs
      sources {
        id
        org_id
        org_name
        document_id
        dsf_id

        # PII fields (filtered based on requesting org's permissions)
        name_used
        ssn_last4
        dob
        address
        phone

        contributed_at
        confirmed_by_org_user_id
      }
    }
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "matchStatus": "confirmed",
#   "limit": 50,
#   "offset": 0
# }

# ----------------------------------------------------------------------------

# Get single participant detail
query GetNetworkParticipant($networkId: ID!, $participantId: ID!) {
  networkParticipant(network_id: $networkId, participant_id: $participantId) {
    id
    network_id
    match_status
    match_confidence_score
    created_at
    confirmed_at
    confirmed_by_user_id

    sources {
      id
      org_id
      org_name
      document_id
      form_id
      dsf_id

      # Full PII (if authorized)
      name_used
      ssn_last4
      dob
      address
      phone
      email

      # Metadata
      contributed_at
      confirmed_by_org_user_id
    }

    # Related data
    incidents {
      id
      incident_type
      severity
      status
      occurred_at
      role  # victim, aggressor, witness, at_risk
    }

    referrals {
      id
      from_org_id
      from_org_name
      to_org_id
      to_org_name
      reason
      status
      urgency
      created_at
    }

    notes {
      id
      author_org_id
      author_org_name
      author_user_id
      content
      note_type
      created_at
    }
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "participantId": "123"
# }

# ----------------------------------------------------------------------------

# Get potential matches needing review
query GetPotentialMatches($networkId: ID!, $status: String) {
  networkPotentialMatches(network_id: $networkId, status: $status) {
    id
    network_id
    match_score
    status
    created_at

    participant_a {
      id
      sources {
        org_name
        name_used
        dob
        ssn_last4
      }
    }

    participant_b {
      id
      sources {
        org_name
        name_used
        dob
        ssn_last4
      }
    }

    match_factors {
      name_similarity
      dob_match
      ssn_match
      address_partial
    }
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "status": "pending_review"
# }

# ============================================================================
# INCIDENT QUERIES
# ============================================================================

# Get all incidents in network
query GetNetworkIncidents(
  $networkId: ID!
  $severity: Severity
  $status: String
  $limit: Int
  $offset: Int
) {
  networkIncidents(
    network_id: $networkId
    severity: $severity
    status: $status
    limit: $limit
    offset: $offset
  ) {
    total
    hasMore
    incidents {
      id
      network_id
      incident_type
      severity
      status

      # Location
      location
      location_lat
      location_lng

      # Timing
      occurred_at

      # Reporting
      reported_by_org_id
      reported_by_org_name
      reported_by_user_id

      # Content
      title
      description
      tags

      # Counts
      participant_count
      responding_org_count

      created_at
      updated_at
    }
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "severity": "critical",
#   "status": "active",
#   "limit": 20,
#   "offset": 0
# }

# ----------------------------------------------------------------------------

# Get single incident with full details
query GetNetworkIncident($networkId: ID!, $incidentId: ID!) {
  networkIncident(network_id: $networkId, incident_id: $incidentId) {
    id
    network_id
    incident_type
    severity
    status
    location
    occurred_at

    reported_by_org_id
    reported_by_org_name
    reported_by_user_id
    reported_by_user_name

    title
    description
    tags

    # Involved participants
    involved_participants {
      id
      participant_id
      role  # victim, aggressor, witness, at_risk
      notes

      participant {
        id
        sources {
          org_name
          name_used  # PII filtered
        }
      }
    }

    # Org responses
    org_responses {
      id
      org_id
      org_name
      status

      planned_actions
      current_actions
      completed_actions

      local_incident_document_id

      updated_at
      last_updated_by_user_id
      last_updated_by_user_name
    }

    # Related notes
    notes {
      id
      author_org_name
      author_user_name
      content
      created_at
    }

    created_at
    updated_at
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "incidentId": "456"
# }

# ============================================================================
# REFERRAL QUERIES
# ============================================================================

# Get referrals for network (with filtering)
query GetNetworkReferrals(
  $networkId: ID!
  $fromOrgId: ID
  $toOrgId: ID
  $status: String
  $limit: Int
) {
  networkReferrals(
    network_id: $networkId
    from_org_id: $fromOrgId
    to_org_id: $toOrgId
    status: $status
    limit: $limit
  ) {
    total
    referrals {
      id
      network_id

      participant_id
      participant {
        sources {
          org_name
          name_used  # Filtered by PII permissions
        }
      }

      from_org_id
      from_org_name
      to_org_id
      to_org_name

      reason
      services_requested
      urgency
      status

      response_notes
      declined_reason

      created_at
      accepted_at
      completed_at

      created_by_user_name
      accepted_by_user_name
    }
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "status": "pending",
#   "limit": 50
