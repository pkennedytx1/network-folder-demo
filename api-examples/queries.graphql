# ============================================================================
# NOTES QUERIES
# ============================================================================

# Get network notes with optional filtering
query GetNetworkNotes(
  $networkId: ID!
  $participantId: ID
  $incidentId: ID
  $noteType: String
  $limit: Int
) {
  networkNotes(
    network_id: $networkId
    related_participant_id: $participantId
    related_incident_id: $incidentId
    note_type: $noteType
    limit: $limit
  ) {
    total
    notes {
      id
      network_id

      author_org_id
      author_org_name
      author_user_id
      author_user_name

      content
      note_type

      related_participant_id
      related_incident_id

      created_at
      updated_at
      edited
    }
  }
}

