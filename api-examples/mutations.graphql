# ============================================================================
# NOTE MUTATIONS
# ============================================================================

# Create network note
mutation CreateNetworkNote($networkId: ID!, $input: NoteInput!) {
  createNetworkNote(network_id: $networkId, input: $input) {
    id
    network_id
    author_org_id
    author_user_id
    content
    note_type
    related_participant_id
    related_incident_id
    created_at
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "input": {
#     "content": "Marcus has been responsive to outreach. Good candidate for employment program referral.",
#     "note_type": "coordination",
#     "related_participant_id": "1"
#   }
# }

# ----------------------------------------------------------------------------

# Update note
mutation UpdateNetworkNote(
  $networkId: ID!
  $noteId: ID!
  $content: String!
) {
  updateNetworkNote(
    network_id: $networkId
    note_id: $noteId
    content: $content
  ) {
    id
    content
    updated_at
    edited
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "noteId": "456",
#   "content": "Updated: Marcus completed employment program intake. Start date scheduled."
# }

# ----------------------------------------------------------------------------

# Delete note (soft delete)
mutation DeleteNetworkNote($networkId: ID!, $noteId: ID!) {
  deleteNetworkNote(network_id: $networkId, note_id: $noteId) {
    success
    message
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "noteId": "789"
# }

# ============================================================================
# PII SETTINGS MUTATIONS
# ============================================================================

# Update org's PII sharing settings
mutation UpdatePIISettings($networkId: ID!, $input: PIISettingsInput!) {
  updateNetworkPIISettings(network_id: $networkId, input: $input) {
    org_id
    pii_sharing_enabled
    fields_shared
    consent_confirmed_at
    consent_confirmed_by_user_id
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "input": {
#     "pii_sharing_enabled": true,
#     "fields_shared": ["name", "dob", "address", "phone"]
#   }
# }

# ----------------------------------------------------------------------------

# Revoke PII consent (emergency stop)
mutation RevokePIIConsent($networkId: ID!, $orgId: ID!) {
  revokePIIConsent(network_id: $networkId, org_id: $orgId) {
    success
    message
    cache_cleared
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "orgId": "103"
# }

# ============================================================================
# ADMIN MUTATIONS
# ============================================================================

# Run matching algorithm manually (admin only)
mutation RunMatchingAlgorithm(
  $networkId: ID!
  $participantSourceId: ID
  $force: Boolean
) {
  runMatchingAlgorithm(
    network_id: $networkId
    participant_source_id: $participantSourceId
    force: $force
  ) {
    job_id
    status
    message
    estimated_completion
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "force": false
# }

# ----------------------------------------------------------------------------

# Clear network cache (admin only)
mutation ClearNetworkCache($networkId: ID!, $cacheType: String) {
  clearNetworkCache(network_id: $networkId, cache_type: $cacheType) {
    success
    keys_cleared
    message
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "cacheType": "participants"
# }

# ----------------------------------------------------------------------------

# Unlink participant sources (undo incorrect match)
mutation UnlinkParticipantSources(
  $networkId: ID!
  $participantId: ID!
  $sourceId: ID!
  $reason: String!
) {
  unlinkParticipantSources(
    network_id: $networkId
    participant_id: $participantId
    source_id: $sourceId
    reason: $reason
  ) {
    success
    new_participant_id
    message
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "participantId": "3",
#   "sourceId": "106",
#   "reason": "Incorrect match - confirmed different person by case manager"
# }

# ============================================================================
# SUBSCRIPTION-RELATED MUTATIONS
# ============================================================================

# Mark notification as read
mutation MarkNotificationRead($notificationId: ID!) {
  markNotificationRead(notification_id: $notificationId) {
    success
  }
}

# Variables example:
# {
#   "notificationId": "12345"
# }

# ============================================================================
# COMPLEX MUTATIONS (Multi-Step Operations)
# ============================================================================

# Create incident and auto-notify all orgs
mutation CreateIncidentWithNotifications(
  $networkId: ID!
  $incident: IncidentInput!
  $notifyOrgs: [ID!]!
  $urgencyLevel: String!
) {
  createIncidentWithNotifications(
    network_id: $networkId
    incident: $incident
    notify_orgs: $notifyOrgs
    urgency_level: $urgencyLevel
  ) {
    incident {
      id
      title
      severity
      created_at
    }
    notifications_sent {
      org_id
      org_name
      sent_at
    }
    org_responses_created
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "incident": {
#     "incident_type": "shooting",
#     "severity": "critical",
#     "title": "Critical incident - immediate response needed",
#     "description": "...",
#     "occurred_at": "2025-03-24T02:15:00Z"
#   },
#   "notifyOrgs": ["101", "102", "105"],
#   "urgencyLevel": "immediate"
# }

# ----------------------------------------------------------------------------

# Accept referral and create local record in one step
mutation AcceptReferralAndCreateRecord(
  $networkId: ID!
  $referralId: ID!
  $responseNotes: String!
  $createLocalRecord: Boolean!
  $formId: Int
) {
  acceptReferralAndCreateRecord(
    network_id: $networkId
    referral_id: $referralId
    response_notes: $responseNotes
    create_local_record: $createLocalRecord
    form_id: $formId
  ) {
    referral {
      id
      status
      accepted_at
    }
    local_document {
      id
      form_id
      created
    }
    success
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "referralId": "2",
#   "responseNotes": "Accepted - creating case file",
#   "createLocalRecord": true,
#   "formId": 10
# }

