) {
  acceptReferral(
    network_id: $networkId
    referral_id: $referralId
    response_notes: $responseNotes
  ) {
    id
    status
    accepted_at
    accepted_by_user_id
    response_notes
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "referralId": "2",
#   "responseNotes": "Accepted. Will reach out to client this week to schedule intake."
# }

