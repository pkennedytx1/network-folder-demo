# ============================================================================
# Network Document Folder - GraphQL Mutations
# ============================================================================
# Complete reference for all mutation operations in the Network Document Folder

# ============================================================================
# PARTICIPANT MUTATIONS
# ============================================================================

# Confirm a potential participant match
mutation ConfirmParticipantMatch(
  $networkId: ID!
  $participantId: ID!
  $sourceIds: [ID!]!
) {
  confirmParticipantMatch(
    network_id: $networkId
    participant_id: $participantId
    source_ids: $sourceIds
  ) {
    id
    match_status
    match_confidence_score
    confirmed_at
    confirmed_by_user_id

    sources {
      id
      org_id
      org_name
      document_id
    }
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "participantId": "4",
#   "sourceIds": ["101", "102"]
# }

# ----------------------------------------------------------------------------

# Reject a potential match
mutation RejectParticipantMatch(
  $networkId: ID!
  $participantId: ID!
  $sourceId: ID!
  $reason: String
) {
  rejectParticipantMatch(
    network_id: $networkId
    participant_id: $participantId
    source_id: $sourceId
    reason: $reason
  ) {
    success
    message
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "participantId": "4",
#   "sourceId": "105",
#   "reason": "Different people confirmed by staff from both orgs"
# }

# ----------------------------------------------------------------------------

# Flag match as needing more information
mutation FlagMatchNeedsReview(
  $networkId: ID!
  $matchId: ID!
  $notes: String
) {
  flagMatchNeedsReview(
    network_id: $networkId
    match_id: $matchId
    notes: $notes
  ) {
    id
    status
    reviewed_at
    review_notes
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "matchId": "789",
#   "notes": "Need to verify with both orgs - DOB discrepancy may be data entry error"
# }

# ----------------------------------------------------------------------------

# Manually link two participants (admin override)
mutation ManuallyLinkParticipants(
  $networkId: ID!
  $participantAId: ID!
  $participantBId: ID!
  $reason: String!
) {
  manuallyLinkParticipants(
    network_id: $networkId
    participant_a_id: $participantAId
    participant_b_id: $participantBId
    reason: $reason
  ) {
    merged_participant {
      id
      sources {
        org_id
        org_name
        document_id
      }
      match_status
      confirmed_at
    }
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "participantAId": "10",
#   "participantBId": "11",
#   "reason": "Confirmed same person via case worker verification - legal name change"
# }

# ============================================================================
# INCIDENT MUTATIONS
# ============================================================================

# Create a new network incident
mutation CreateNetworkIncident($networkId: ID!, $input: IncidentInput!) {
  createNetworkIncident(network_id: $networkId, input: $input) {
    id
    network_id
    incident_type
    severity
    status
    location
    occurred_at
    reported_by_org_id
    title
    description
    tags
    created_at
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "input": {
#     "incident_type": "shooting",
#     "severity": "critical",
#     "status": "active",
#     "location": "4100 W. Lake St",
#     "occurred_at": "2025-03-24T02:15:00Z",
#     "title": "Early morning shooting - Lake St",
#     "description": "Shooting just occurred. Multiple shots fired. Area extremely volatile.",
#     "tags": ["shooting", "active", "high_priority"],
#     "participant_ids": [3, 9],
#     "participant_roles": {
#       "3": "at_risk",
#       "9": "witness"
#     }
#   }
# }

# ----------------------------------------------------------------------------

# Update org's response to an incident
mutation UpdateOrgResponse(
  $networkId: ID!
  $incidentId: ID!
  $orgId: ID!
  $input: OrgResponseInput!
) {
  updateOrgResponse(
    network_id: $networkId
    incident_id: $incidentId
    org_id: $orgId
    input: $input
  ) {
    id
    org_id
    org_name
    status
    planned_actions
    current_actions
    completed_actions
    updated_at
    last_updated_by_user_id
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "incidentId": "5",
#   "orgId": "101",
#   "input": {
#     "status": "in_progress",
#     "current_actions": [
#       "Emergency response coordination",
#       "Hospital outreach"
#     ],
#     "completed_actions": [
#       "Initial assessment",
