# Create cross-org referral
mutation CreateReferral($networkId: ID!, $input: ReferralInput!) {
  createReferral(network_id: $networkId, input: $input) {
    id
    network_id
    participant_id
    from_org_id
    from_org_name
    to_org_id
    to_org_name
    reason
    services_requested
    urgency
    status
    created_at
    created_by_user_id
  }
}

