# Link participant to incident
mutation LinkParticipantToIncident(
  $incidentId: ID!
  $participantId: ID!
  $role: ParticipantRole!
  $notes: String
) {
  linkParticipantToIncident(
    incident_id: $incidentId
    participant_id: $participantId
    role: $role
    notes: $notes
  ) {
    id
    incident_id
    participant_id
    role
    notes
  }
}

# Variables example:
# {
#   "incidentId": "1",
#   "participantId": "3",
#   "role": "victim",
#   "notes": "Shot in leg, non-life-threatening"
# }

# ----------------------------------------------------------------------------

# Update incident status
mutation UpdateIncidentStatus(
  $networkId: ID!
  $incidentId: ID!
  $status: String!
  $notes: String
) {
  updateIncidentStatus(
    network_id: $networkId
    incident_id: $incidentId
    status: $status
    notes: $notes
  ) {
    id
    status
    updated_at
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "incidentId": "3",
#   "status": "resolved",
#   "notes": "Both parties agreed to informal truce. Mediation successful."
# }

# ----------------------------------------------------------------------------

# Import incident to local org database
mutation ImportIncidentToOrg(
  $networkId: ID!
  $incidentId: ID!
  $orgId: ID!
  $formId: Int!
) {
  importIncidentToOrg(
    network_id: $networkId
    incident_id: $incidentId
    org_id: $orgId
    form_id: $formId
  ) {
    local_document_id
    network_incident_id
    success
    message
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "incidentId": "5",
#   "orgId": "102",
#   "formId": 25
# }

