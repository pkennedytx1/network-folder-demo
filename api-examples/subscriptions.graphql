# ============================================================================
# Network Document Folder - GraphQL Subscriptions
# ============================================================================
# Real-time event subscriptions for live collaboration

# ============================================================================
# PARTICIPANT SUBSCRIPTIONS
# ============================================================================

# Subscribe to participant updates in a network
subscription OnParticipantUpdated($networkId: ID!) {
  participantUpdated(network_id: $networkId) {
    participant {
      id
      network_id
      match_status
      match_confidence_score
      sources {
        id
        org_id
        org_name
        document_id
        name_used  # PII filtered based on your org permissions
        dob
        ssn_last4
      }
    }
    change_type  # CREATED, UPDATED, DELETED, MATCH_CONFIRMED
    changed_by_org_id
    changed_by_org_name
    changed_at
  }
}

# Usage in React:
# const { data, loading } = useSubscription(ON_PARTICIPANT_UPDATED, {
#   variables: { networkId: "1" }
# });

# ----------------------------------------------------------------------------

# Subscribe to new potential matches detected
subscription OnMatchDetected($networkId: ID!) {
  matchDetected(network_id: $networkId) {
    match {
      id
      network_id
      match_score
      status

      participant_a {
        id
        sources {
          org_name
          name_used
          dob
        }
      }

      participant_b {
        id
        sources {
          org_name
          name_used
          dob
        }
      }

      match_factors {
        name_similarity
        dob_match
        ssn_match
      }
    }

    detected_at
    requires_review
  }
}

# ============================================================================
# INCIDENT SUBSCRIPTIONS
# ============================================================================

# Subscribe to incident updates
subscription OnIncidentUpdated($networkId: ID!) {
  incidentUpdated(network_id: $networkId) {
    incident {
      id
      network_id
      incident_type
      severity
      status
      title
      description
      occurred_at
      reported_by_org_name

      involved_participants {
        participant_id
        role
      }

      org_responses {
        org_id
        org_name
        status
        current_actions
      }
    }

    change_type  # CREATED, UPDATED, STATUS_CHANGED, RESPONSE_UPDATED
    changed_by_org_id
    changed_by_org_name
    changed_at
  }
}

# ----------------------------------------------------------------------------

# Subscribe to org response updates for specific incident
subscription OnIncidentResponseUpdated($networkId: ID!, $incidentId: ID!) {
  incidentResponseUpdated(network_id: $networkId, incident_id: $incidentId) {
    response {
      org_id
      org_name
      status
      planned_actions
      current_actions
      completed_actions
      updated_at
      last_updated_by_user_name
    }

    action_type  # STATUS_CHANGED, ACTIONS_UPDATED, IMPORTED_TO_ORG
    updated_by_org_id
    updated_at
  }
}

# ============================================================================
# REFERRAL SUBSCRIPTIONS
# ============================================================================

# Subscribe to referrals for your organization
subscription OnReferralReceived($networkId: ID!, $orgId: ID!) {
  referralReceived(network_id: $networkId, org_id: $orgId) {
    referral {
      id
      network_id
      participant_id
      participant {
        sources {
          org_name
          name_used  # PII filtered
        }
      }

      from_org_id
      from_org_name
      reason
      services_requested
      urgency
      status

      created_at
      created_by_user_name
    }

    notification_type  # NEW_REFERRAL, ACCEPTED, DECLINED, COMPLETED
  }
}

# ----------------------------------------------------------------------------

# Subscribe to referral status changes
subscription OnReferralStatusChanged($networkId: ID!, $referralId: ID!) {
  referralStatusChanged(network_id: $networkId, referral_id: $referralId) {
    referral_id
    old_status
    new_status
    changed_by_org_id
    changed_by_org_name
    changed_by_user_name
    changed_at

    response_notes
  }
}

# ============================================================================
# NOTE/COLLABORATION SUBSCRIPTIONS
# ============================================================================

# Subscribe to new network notes
subscription OnNetworkNoteCreated($networkId: ID!) {
  networkNoteCreated(network_id: $networkId) {
    note {
      id
      network_id
      author_org_id
      author_org_name
      author_user_name
      content
      note_type
      related_participant_id
      related_incident_id
      created_at
    }

    is_mention  # True if your org/user is mentioned
  }
}

# ----------------------------------------------------------------------------

# Subscribe to notes about a specific participant
subscription OnParticipantNoteAdded($networkId: ID!, $participantId: ID!) {
  participantNoteAdded(network_id: $networkId, participant_id: $participantId) {
    note {
      id
      author_org_name
      author_user_name
      content
      note_type
      created_at
    }
  }
}

# ----------------------------------------------------------------------------

# Subscribe to notes about a specific incident
subscription OnIncidentNoteAdded($networkId: ID!, $incidentId: ID!) {
  incidentNoteAdded(network_id: $networkId, incident_id: $incidentId) {
    note {
      id
      author_org_name
      author_user_name
      content
      created_at
    }
  }
}

# ============================================================================
# NETWORK-WIDE SUBSCRIPTIONS
# ============================================================================

# Subscribe to all network activity (for dashboard)
subscription OnNetworkActivity($networkId: ID!) {
  networkActivity(network_id: $networkId) {
    activity_type  # INCIDENT_CREATED, MATCH_CONFIRMED, REFERRAL_SENT, NOTE_ADDED, etc.
    resource_type  # participant, incident, referral, note
    resource_id
    summary

    actor_org_id
    actor_org_name
    actor_user_name

    occurred_at

    # Optional details based on activity type
    details {
      incident {
        id
        title
        severity
      }
      participant {
        id
        match_status
      }
      referral {
        id
        from_org_name
        to_org_name
        urgency
      }
    }
  }
}

# ============================================================================
# PRESENCE/TYPING INDICATORS (Advanced)
# ============================================================================

# Subscribe to who's currently viewing an incident
subscription OnIncidentPresence($networkId: ID!, $incidentId: ID!) {
  incidentPresence(network_id: $networkId, incident_id: $incidentId) {
    users_viewing {
      user_id
      user_name
      org_id
      org_name
      viewing_since
    }

    users_editing {
      user_id
      user_name
      org_id
      org_name
      editing_field
    }
  }
}

# ----------------------------------------------------------------------------

# Typing indicator for notes/comments
subscription OnTypingIndicator($networkId: ID!, $resourceType: String!, $resourceId: ID!) {
  typingIndicator(
    network_id: $networkId
    resource_type: $resourceType
    resource_id: $resourceId
  ) {
    user_id
    user_name
    org_name
    is_typing
    timestamp
  }
}

# ============================================================================
# ALERT SUBSCRIPTIONS (High Priority)
# ============================================================================

# Subscribe to critical alerts for your org
subscription OnCriticalAlert($networkId: ID!, $orgId: ID!) {
  criticalAlert(network_id: $networkId, org_id: $orgId) {
    alert_type  # CRITICAL_INCIDENT, URGENT_REFERRAL, HIGH_RISK_PARTICIPANT
    priority  # critical, high
    title
    message

    related_resource {
      type
      id
    }

    requires_immediate_action
    action_url

    created_at
  }
}

# ============================================================================
# PII/SETTINGS SUBSCRIPTIONS
# ============================================================================

# Subscribe to PII settings changes (for cache invalidation)
subscription OnPIISettingsChanged($networkId: ID!) {
  piiSettingsChanged(network_id: $networkId) {
    org_id
    org_name
    pii_sharing_enabled
    fields_shared
    changed_at

    # Client should invalidate cache and re-query
    invalidate_cache_keys
  }
}

