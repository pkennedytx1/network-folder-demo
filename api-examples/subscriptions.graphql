# ============================================================================
# NOTES
# ============================================================================

# WebSocket Connection Management:
# - Automatically reconnects on disconnect
# - Maintains connection with heartbeat pings
# - Authenticates via connection params
# - Handles multiple subscriptions over single connection
#
# Performance Considerations:
# - Use selective subscriptions (don't subscribe to everything)
# - Unsubscribe when component unmounts
# - Debounce rapid updates to avoid UI thrashing
# - Consider using React Query with subscription updates instead of state
#
# Redis Pub/Sub Channels (Backend):
# - PARTICIPANT_UPDATED_{network_id}
# - INCIDENT_UPDATED_{network_id}
# - MATCH_DETECTED_{network_id}
# - REFERRAL_{network_id}_{org_id}
# - CRITICAL_ALERT_{network_id}_{org_id}
