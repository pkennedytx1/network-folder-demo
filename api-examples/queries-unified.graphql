# ============================================================================
# NETWORK MEMBER ORGS & PII SETTINGS
# ============================================================================

# Get network member orgs with PII settings
query GetNetworkMemberOrgs($networkId: ID!) {
  networkMemberOrgs(network_id: $networkId) {
    orgs {
      org_id
      org_name
      member_type           # 'internal' (Apricot) or 'external' (Snowflake)

      # Internal config
      data_standard_form_id

      # External config
      snowflake_view
      snowflake_schema
      snowflake_connection_id

      # PII settings (FIELD IDs, not names)
      pii_sharing_enabled
      pii_fields_shared     # Array of field IDs: [4721, 4722, 4723]
      pii_consent_confirmed_at
      pii_consent_confirmed_by_user_name

      active
      joined_at
    }
  }
}

# Variables example:
# {
#   "networkId": "1"
# }

# ----------------------------------------------------------------------------

# Get my org's settings in this network
query GetMyOrgNetworkSettings($networkId: ID!) {
  myOrgNetworkSettings(network_id: $networkId) {
    org_id
    org_name
    member_type

    # What I'm sharing
    pii_sharing_enabled
    pii_fields_shared     # Field IDs I'm sharing: [4721, 4722, 4723]

    # What I can see from others
    can_view_pii_from_orgs {
      org_id
      org_name
      field_ids_available # Field IDs this org is sharing
    }

    # Permissions
    role                  # network_admin, network_member
    can_confirm_matches
    can_share_records
    can_import_records
  }
}

