# ============================================================================
# DATA STANDARD VALIDATION QUERIES (Phase 0)
# ============================================================================

# Get validation rules for a data standard
query GetDataStandardValidationRules($dataStandardId: ID!) {
  dataStandard(id: $dataStandardId) {
    id
    name
    standard_type           # 'general', 'participant', 'incident'

    # Validation rules (if type is participant or incident)
    validation_rules {
      id
      rule_type             # 'required_tier1', 'required_field', etc.
      rule_config           # JSON config
      rule_description
      error_message
      active
    }
  }
}

# Variables example:
# {
#   "dataStandardId": "10"
# }

# ----------------------------------------------------------------------------

# Validate if data standard is ready for network sharing
query ValidateDataStandard($dataStandardId: ID!) {
  validateDataStandard(data_standard_id: $dataStandardId) {
    is_valid
    errors                  # Array of validation error messages
    warnings                # Array of warnings (non-blocking)

    missing_requirements {
      requirement_type
      description
      how_to_fix
    }
  }
}

