# ----------------------------------------------------------------------------

# Search participants by name (with PII filtering)
query SearchParticipants($networkId: ID!, $searchTerm: String!) {
  searchNetworkSharedRecords(
    network_id: $networkId
    record_type: "participant"
    search_term: $searchTerm
  ) {
    results {
      id
      status
      match_confidence_score

      # DSF view data automatically filtered by field IDs
      sources {
        org_name
        dsf_view_data         # Only includes field IDs I'm allowed to see
      }

      # Show recent activity
      responses {
        response_type
        created_at
      }

      notes {
        id
        note_type
        created_at
      }

      created_at
    }
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "searchTerm": "Marcus"
# }

# ----------------------------------------------------------------------------

# Get all incident responses for specific org (my org's dashboard)
query GetMyOrgIncidentResponses($networkId: ID!, $myOrgId: ID!) {
  networkSharedRecords(
    network_id: $networkId
    record_type: "incident"
    status: "confirmed"
  ) {
    records {
      id
      metadata              # Incident details

      # Find my org's response
      my_org_response: responses(org_id: $myOrgId) {
        id
        response_type
        response_data       # {"status": "in_progress", "planned_actions": [...]}
        created_at
        updated_at
      }

      # See what other orgs are doing
      other_org_responses: responses(exclude_org_id: $myOrgId) {
        org_name
        response_data
        updated_at
      }
    }
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "myOrgId": "102"
