# ============================================================================
# Network Document Folder - GraphQL Queries (UNIFIED SCHEMA)
# ============================================================================
# Complete reference for all query operations using unified network_shared_records table
# Key Changes:
# - Single `networkSharedRecords` query (replaces networkParticipants, networkIncidents)
# - `record_type` filter for participant vs incident
# - `metadata` JSON field for type-specific data
# - Field ID-based PII filtering (not field names)
# - Referrals removed (separate microservice)
# ============================================================================

# ============================================================================
# CORE QUERIES: UNIFIED SHARED RECORDS
# ============================================================================

# Get all shared records (participants, incidents, or both)
query GetNetworkSharedRecords(
  $networkId: ID!
  $recordType: RecordType      # 'participant' or 'incident' (optional filter)
  $status: RecordStatus        # 'pending', 'confirmed', 'rejected'
  $limit: Int
  $offset: Int
) {
  networkSharedRecords(
    network_id: $networkId
    record_type: $recordType
    status: $status
    limit: $limit
    offset: $offset
  ) {
    total
    hasMore
    records {
      id
      network_id
      data_standard_id
      record_type               # 'participant' or 'incident'
      status                    # 'pending', 'confirmed', 'rejected'
      match_confidence_score    # Only for participants

      # Type-specific data stored in JSON
      # Participant example: {"matching_algorithm_version": "1.0", "confirmed_at": "..."}
      # Incident example: {"severity": "high", "incident_type": "shooting", "location": "Portland, OR", ...}
      metadata

      # Sources (from tenant DBs)
      sources {
        id
        org_id
        org_name
        tenant_document_id      # tier1_record_id in tenant DB
        dsf_id
        source_type             # 'apricot' or 'snowflake'

        # DSF view data (PII filtered based on field IDs)
        # Example: {"field_4721": "Marcus Thompson", "field_4722": "1998-03-15", "field_4723": "4521"}
        dsf_view_data

        contributed_at
        confirmed_by_org_user_id
      }

      # Org responses (matches, incident responses, imports)
      responses {
        id
        org_id
        org_name
        response_type           # 'match_confirmed', 'incident_responded', 'imported_to_tenant'
        response_data           # JSON with response details
        created_at
        created_by_user_id
      }

      created_at
      updated_at
      created_by_org_id
    }
  }
}

# Variables examples:

# Get all confirmed participants:
# {
#   "networkId": "1",
#   "recordType": "participant",
#   "status": "confirmed",
#   "limit": 50,
#   "offset": 0
# }

# Get all active incidents:
# {
#   "networkId": "1",
#   "recordType": "incident",
#   "status": "confirmed",
#   "limit": 20,
#   "offset": 0
# }

# Get all records (participants + incidents):
# {
#   "networkId": "1",
#   "limit": 100,
#   "offset": 0
# }

# ----------------------------------------------------------------------------

# Get single shared record with full details
query GetNetworkSharedRecord($networkId: ID!, $recordId: ID!) {
  networkSharedRecord(network_id: $networkId, record_id: $recordId) {
    id
    network_id
    data_standard_id
    record_type
    status
    match_confidence_score
    metadata

    # Sources from multiple orgs
    sources {
      id
      org_id
      org_name
      tenant_document_id
      dsf_id
      source_type
      dsf_view_data         # PII filtered by field IDs
      contributed_at
      confirmed_by_org_user_id

      # Source-specific metadata
      metadata              # Contains hashes, match scores, etc.
    }

    # All responses to this record
    responses {
      id
      org_id
      org_name
      response_type
      response_data
      created_at
      created_by_user_id
      created_by_user_name
    }

    # Related notes
    notes {
      id
      author_org_id
      author_org_name
      author_user_id
      author_user_name
      content
      note_type
      created_at
    }

    created_at
    updated_at
    created_by_org_id
    created_by_org_name
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "recordId": "123"
# }

# ============================================================================
# PARTICIPANT-SPECIFIC QUERIES
# ============================================================================

# Get potential participant matches needing review
query GetPotentialMatches($networkId: ID!, $status: String) {
  networkPotentialMatches(network_id: $networkId, status: $status) {
    id
    network_id
    match_score
    status
    match_factors           # JSON: {"ssn": 45, "dob": 35, "name": 20}
    created_at
    reviewed_at
    reviewed_by_user_name
    review_notes

    # The two records that might be the same person
    shared_record_a {
      id
      sources {
        org_name
        dsf_view_data       # PII filtered
      }
    }

    shared_record_b {
      id
      sources {
        org_name
        dsf_view_data       # PII filtered
      }
    }
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "status": "pending_review"
# }

# ============================================================================
# NOTES QUERIES
# ============================================================================

# Get network notes with optional filtering
query GetNetworkNotes(
  $networkId: ID!
  $sharedRecordId: ID     # Optional: filter by specific record
  $noteType: String
  $limit: Int
) {
  networkNotes(
    network_id: $networkId
    network_shared_record_id: $sharedRecordId
    note_type: $noteType
    limit: $limit
  ) {
    total
    notes {
      id
      network_id
      network_shared_record_id

      author_org_id
      author_org_name
      author_user_id
      author_user_name

      content
      note_type             # 'general', 'coordination', 'alert', 'update'

      created_at
      updated_at
      edited
    }
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "noteType": "alert",
#   "limit": 100
# }

# ----------------------------------------------------------------------------

# Get notes for specific shared record (participant or incident)
query GetRecordNotes($networkId: ID!, $recordId: ID!) {
  networkNotes(
    network_id: $networkId
    network_shared_record_id: $recordId
  ) {
    notes {
      id
      author_org_name
      author_user_name
      content
      note_type
      created_at
    }
  }
}

# Variables example:
# {
#   "networkId": "1",
#   "recordId": "456"
