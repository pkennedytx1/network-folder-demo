# ============================================================================
# AUDIT LOG QUERIES
# ============================================================================

# Get audit log for network (admin only)
query GetNetworkAuditLog(
  $networkId: ID!
  $action: String         # 'view_pii', 'confirm_match', 'share_record', 'import_record'
  $resourceType: String
  $userId: ID
  $startDate: String
  $endDate: String
  $limit: Int
) {
  networkAuditLog(
    network_id: $networkId
    action: $action
    resource_type: $resourceType
    user_id: $userId
    start_date: $startDate
    end_date: $endDate
    limit: $limit
  ) {
    total
    entries {
      id
      user_id
      user_name
      org_id
      org_name

      action
      resource_type
      resource_id

      # Details include field IDs for PII access
      # Example: {"field_ids_accessed": [4721, 4722], "source_type": "apricot"}
      details

      ip_address
      user_agent

      created_at
    }
  }
}

