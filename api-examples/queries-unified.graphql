# ============================================================================
# PERFORMANCE NOTES
# ============================================================================

# Caching:
# - networkSharedRecords: 5-minute TTL
# - networkSharedRecord (detail): 10-minute TTL
# - networkMemberOrgs (PII settings): 1-hour TTL
# - potentialMatches: 5-minute TTL

# Pagination:
# - Default limit: 50 records
# - Max limit: 100 records
# - Always use offset for pagination

# PII Filtering:
# - Happens server-side based on field IDs in network_member_orgs.pii_fields_shared
# - Logged in audit log with field IDs accessed

