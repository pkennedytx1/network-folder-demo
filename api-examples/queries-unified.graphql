# ============================================================================
# NETWORK METADATA & STATISTICS
# ============================================================================

# Get network overview with statistics
query GetNetworkOverview($networkId: ID!) {
  network(id: $networkId) {
    id
    name
    description
    lead_org_id
    lead_org_name

    # Member orgs
    member_orgs {
      org_id
      org_name
      member_type
      joined_at
      pii_sharing_enabled
    }

    # Statistics
    statistics {
      total_shared_records
      participant_records_count
      incident_records_count
      confirmed_matches
      potential_matches
      total_notes
      active_orgs
    }

    created_at
  }
}

