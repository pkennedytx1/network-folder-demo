# ============================================================================
# COMPLEX QUERIES (Real-World Use Cases)
# ============================================================================

# Dashboard query - get everything for network home page
query GetNetworkDashboard($networkId: ID!) {
  network(id: $networkId) {
    id
    name

    # Recent incidents (last 7 days)
    recentIncidents: sharedRecords(
      record_type: "incident"
      limit: 5
      order_by: "created_at_desc"
    ) {
      id
      metadata              # Contains severity, incident_type, location, etc.
      sources {
        org_name
      }
      created_at
    }

    # Potential participant matches needing review
    potentialMatches(status: "pending_review", limit: 10) {
      id
      match_score
      shared_record_a {
        sources { org_name, dsf_view_data }
      }
      shared_record_b {
        sources { org_name, dsf_view_data }
      }
    }

    # Recent network activity notes
    recentNotes(limit: 10, note_type: ["alert", "coordination"]) {
      id
      author_org_name
      content
      note_type
      created_at
    }

    # Statistics
    statistics {
      participant_records_count
      incident_records_count
      potential_matches
    }
  }
}

